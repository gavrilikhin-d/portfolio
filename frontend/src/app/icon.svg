<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mark-gradient" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa" />
      <stop offset="0.5" stop-color="#6366f1" />
      <stop offset="1" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- <feGaussianBlur stdDeviation="10" result="blur" /> -->
      <feMerge>
        <!-- <feMergeNode in="blur" /> -->
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0a0a0a" />
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none" stroke="url(#mark-gradient)" stroke-width="18" opacity="0.65" />
  <text
    x="256"
    y="286"
    fill="url(#mark-gradient)"
    filter="url(#glow)"
    font-family="Geist Mono, SFMono-Regular, Consolas, Liberation Mono, monospace"
    font-size="112"
    font-weight="800"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-8"
  >&lt;DG/&gt;</text>
</svg>
